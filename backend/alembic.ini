# Alembic Configuration — AgentShield AI
# ============================================================
# NOTE: sqlalchemy.url is overridden at runtime by env.py
# using the DATABASE_URL from application settings.
# ============================================================

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template used for generating new migration files
file_template = %%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .hierarchies to be traversed
# during autogeneration of migration scripts
sourceless = false

# Version path separator; use 'os' for os.pathsep
version_path_separator = os

# Output encoding for migration files
output_encoding = utf-8

# Placeholder — overridden by env.py from app config
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
